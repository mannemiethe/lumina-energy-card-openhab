                          r: 3.2
                          class: luminaFlowDot
                          fill: "#80ffff"
                        slots:
                          default:
                            - component: animateMotion
                              config:
                                path: "M 270 232 L 410 275"
                                dur: 2.6s
                                begin: -.35s
                                repeatCount: indefinite
                                rotate: auto
                - component: g
                  config:
                    class: luminaFlowGroup
                    visible: "=Math.abs(Number.parseFloat((items[props.batteryPowerItem] && items[props.batteryPowerItem].state) || 0)) >= Number(props.flowThreshold || 30) && !(items[props.showBatteryItem] && items[props.showBatteryItem].state === 'OFF')"
                  slots:
