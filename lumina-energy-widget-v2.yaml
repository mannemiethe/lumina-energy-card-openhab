                      - component: path
                        config:
                          d: "=(Number.parseFloat((items[props.batteryPowerItem] && items[props.batteryPowerItem].state) || 0) >= 0) ? 'M 416 292 L 353 314' : 'M 353 314 L 416 292'"
                          class: luminaFlowBase
                          fill: none
