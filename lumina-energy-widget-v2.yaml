uid: lumina_energy_widget_v2
props:
  parameters:
    - name: title
      label: Title
      type: TEXT
      default: Lumina Energy
    - name: backgroundImage
      label: Day Background Image URL
      type: TEXT
      default: /static/lumina/lumina_background_without_everything.png
    - name: nightBackgroundImage
      label: Night Background Image URL
      type: TEXT
      default: /static/lumina/lumina_background_without_everything.png
    - name: nightModeItem
      label: Night Mode Item
      type: TEXT
      default: Lumina_Night_Mode
    - name: flowThreshold
      label: Flow Visibility Threshold (W)
      type: INTEGER
      default: 30
    - name: pvPowerItem
      label: PV Total Power Item
      type: TEXT
      default: Lumina_PV_Power
    - name: pvPrimaryPowerItem
      label: PV Array 1 Power Item
      type: TEXT
      default: Lumina_PV_Array1_Power
    - name: pvSecondaryPowerItem
      label: PV Array 2 Power Item
      type: TEXT
      default: Lumina_PV_Array2_Power
    - name: pvDailyItem
      label: PV Daily Energy Item
      type: TEXT
      default: Lumina_PV_Daily
    - name: homeLoadItem
      label: House Load Item
      type: TEXT
      default: Lumina_House_Load
    - name: gridPowerItem
      label: Grid Power Item (+import / -export)
      type: TEXT
      default: Lumina_Grid_Power
    - name: batteryPowerItem
      label: Battery Flow Item (+charge / -discharge)
      type: TEXT
      default: Lumina_Battery_Power
    - name: batterySocItem
      label: Battery SOC Item
      type: TEXT
      default: Lumina_Battery_SOC
    - name: inverterPowerItem
      label: Inverter Power Item
      type: TEXT
      default: Lumina_Inverter_Power
    - name: evPowerItem
      label: EV Power Item
      type: TEXT
      default: Lumina_EV_Power
    - name: evSocItem
      label: EV SOC Item
      type: TEXT
      default: Lumina_EV_SOC
    - name: ev2PowerItem
      label: EV 2 Power Item
      type: TEXT
      default: Lumina_EV2_Power
    - name: ev2SocItem
      label: EV 2 SOC Item
      type: TEXT
      default: Lumina_EV2_SOC
    - name: poolPowerItem
      label: Pool Power Item
      type: TEXT
      default: Lumina_Pool_Power
    - name: heatPumpPowerItem
      label: Heat Pump Power Item
      type: TEXT
      default: Lumina_HeatPump_Power
    - name: solarForecastItem
      label: Solar Forecast Item
      type: TEXT
      default: Lumina_Solar_Forecast
    - name: temperatureItem
      label: House Temperature Item
      type: TEXT
      default: Lumina_House_Temperature
    - name: humidityItem
      label: House Humidity Item
      type: TEXT
      default: Lumina_House_Humidity
    - name: showPVItem
      label: Show PV Item
      type: TEXT
      default: Lumina_Show_PV
    - name: showGridItem
      label: Show Grid Item
      type: TEXT
      default: Lumina_Show_Grid
    - name: showBatteryItem
      label: Show Battery Item
      type: TEXT
      default: Lumina_Show_Battery
    - name: showEVItem
      label: Show EV Item
      type: TEXT
      default: Lumina_Show_EV
    - name: showEV2Item
      label: Show EV 2 Item
      type: TEXT
      default: Lumina_Show_EV2
    - name: showPoolItem
      label: Show Pool Item
      type: TEXT
      default: Lumina_Show_Pool
    - name: showHeatPumpItem
      label: Show Heat Pump Item
      type: TEXT
      default: Lumina_Show_HeatPump
    - name: showForecastItem
      label: Show Solar Forecast Item
      type: TEXT
      default: Lumina_Show_Solar_Forecast
    - name: showHomePanelItem
      label: Show Home Panel Item
      type: TEXT
      default: Lumina_Show_Home_Panel
    - name: textVisibilityItem
      label: Text Visibility Item
      type: TEXT
      default: Lumina_Text_Visible
    - name: houseType
      label: House Type (old/new/custom)
      type: TEXT
      default: old
    - name: oldHouseOverlayImage
      label: Old House Overlay Image URL
      type: TEXT
      default: /static/lumina/oldhouse.png
    - name: newHouseOverlayImage
      label: New House Overlay Image URL
      type: TEXT
      default: /static/lumina/newhouse.png
    - name: customHouseOverlayImage
      label: Custom House Overlay Image URL
      type: TEXT
      default: /static/lumina/oldhouse.png
    - name: solarOverlayImage
      label: Solar Overlay Image URL
      type: TEXT
      default: /static/lumina/solar.png
    - name: gridConnectorOverlayImage
      label: Grid Connector Overlay Image URL
      type: TEXT
      default: /static/lumina/grid-connector.png
    - name: inverterOverlayImage
      label: Inverter Overlay Image URL
      type: TEXT
      default: /static/lumina/inverter.png
    - name: batteryOverlayImage
      label: Battery Overlay Image URL
      type: TEXT
      default: /static/lumina/battery.png
    - name: carOverlayImage
      label: Car Overlay Image URL
      type: TEXT
      default: /static/lumina/car.png
    - name: poolOverlayImage
      label: Pool Overlay Image URL
      type: TEXT
      default: /static/lumina/Pool.png
    - name: heatPumpType
