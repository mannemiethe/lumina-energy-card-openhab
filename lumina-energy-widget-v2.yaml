component: f7-card
config:
  class:
    - lumina-energy-widget
  style:
    margin: 0
    borderRadius: 22px
    overflow: hidden
    background: "#020916"
    boxShadow: 0 12px 35px rgba(0,0,0,.45)
slots:
  default:
    - component: f7-block
      config:
        class:
          - lumina-stage
        style:
          position: relative
          aspectRatio: "16 / 9"
          minHeight: 50px
          padding: 0
          margin: 0
          overflow: hidden
          color: white
          backgroundImage: "=(items[props.nightModeItem] && (items[props.nightModeItem].state === 'ON' || items[props.nightModeItem].state === 'OPEN')) ? `url(${props.nightBackgroundImage})` : `url(${props.backgroundImage})`"
          backgroundSize: cover
          backgroundPosition: center
          fontFamily: "Exo 2, Orbitron, system-ui, sans-serif"
      slots:
        default:
          - component: f7-block
            config:
              style:
                position: absolute
                inset: 0
                margin: 0
                padding: 0
                background: radial-gradient(circle at 50% 48%, rgba(0,255,255,.08), rgba(0,0,0,.08) 42%, rgba(0,0,0,.22) 100%)
                pointerEvents: none

          - component: svg
            config:
              viewBox: 0 0 800 450
              preserveAspectRatio: xMidYMid meet
              style:
                position: absolute
                inset: 0
                width: 100%
                height: 100%
                overflow: visible
                filter: drop-shadow(0 0 6px rgba(0,255,255,.35))
                zIndex: 2
            slots:
              default:
                - component: defs
                  slots:
                    default:
                      - component: style
                        config:
                          stylesheet: |
                            @keyframes luminaShimmer { from { stroke-dashoffset: 100; } to { stroke-dashoffset: 0; } }
                            @keyframes luminaGlowPulse { 0%,100% { opacity: .72; } 50% { opacity: 1; } }
                            .luminaText { display: none; font-family: 'Exo 2', Orbitron, sans-serif; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; text-anchor: middle; dominant-baseline: central; paint-order: stroke; stroke: rgba(0,15,25,.45); stroke-width: 2px; text-shadow: 0 0 4px rgba(245,243,238,.6), 0 0 14px currentColor; }
                            .luminaSmall { font-size: 12px; letter-spacing: 1px; }
                            .luminaValue { font-size: 12px; }
                            .luminaFlowBase { fill: none !important; stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round; stroke-opacity: .18; }
                            .luminaFlowShimmer { fill: none !important; stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 14 86; stroke-dashoffset: 100; filter: drop-shadow(0 0 10px currentColor); animation: luminaShimmer 2.6s linear infinite, luminaGlowPulse .9s ease-in-out infinite; }
                            .luminaFlowDot { filter: drop-shadow(0 0 10px currentColor); opacity: .96; }
                            .luminaFlowDotHalo { opacity: .18; filter: drop-shadow(0 0 14px currentColor); }
                            .luminaFlowShimmer.reverse2 { animation-delay: -.28s, 0s; }
                            .luminaFlowShimmer.reverse3 { animation-delay: -.56s, 0s; }
                            .luminaFlowShimmer.reverse4 { animation-delay: -.84s, 0s; }
                            .luminaFlowShimmer.reverse5 { animation-delay: -1.12s, 0s; }
                            .luminaFlowShimmer.reverse6 { animation-delay: -1.4s, 0s; }
                            .luminaFlowShimmer.reverse7 { animation-delay: -1.68s, 0s; }
                            .luminaFlowShimmer.reverse8 { animation-delay: -1.96s, 0s; }
                            .luminaFlowShimmer.reverse9 { animation-delay: -2.24s, 0s; }
                # Home Assistant-style animated flow layer:
                # base line + moving shimmer + visible particles travelling along each original FLOW_PATHS path.
                - component: g
                  config:
                    class: luminaFlowGroup
                    visible: "=Math.abs(Number.parseFloat((items[props.pvPowerItem] && items[props.pvPowerItem].state) || 0)) >= Number(props.flowThreshold || 30) && !(items[props.showPVItem] && items[props.showPVItem].state === 'OFF')"
                  slots:
                    default:
                      - component: path
                        config:
                          d: "M 193 201 L 415 270"
                          class: luminaFlowBase
                          fill: none
                          stroke: "#0080ff"
                      - component: path
                        config:
                          d: "M 193 201 L 415 270"
                          class: luminaFlowShimmer
                          fill: none
                          stroke: "#0080ff"
                          pathLength: 100
                        slots:
                          default:
                            - component: animate
                              config:
                                attributeName: stroke-dashoffset
                                from: 100
                                to: 0
                                dur: 2.6s
                                repeatCount: indefinite
                      - component: circle
                        config:
                          r: 7
                          class: luminaFlowDotHalo
                          fill: "#0080ff"
                        slots:
                          default:
                            - component: animateMotion
                              config:
                                path: "M 193 201 L 415 270"
                                dur: 2.6s
                                begin: 0s
                                repeatCount: indefinite
                                rotate: auto
                      - component: circle
                        config:
                          r: 3.2
                          class: luminaFlowDot
                          fill: "#0080ff"
                        slots:
                          default:
                            - component: animateMotion
                              config:
                                path: "M 193 201 L 415 270"
                                dur: 2.6s
                                begin: 0s
                                repeatCount: indefinite
                                rotate: auto
                - component: g
                  config:
                    class: luminaFlowGroup
                    visible: "=Math.abs(Number.parseFloat((items[props.pvSecondaryPowerItem] && items[props.pvSecondaryPowerItem].state) || 0)) >= Number(props.flowThreshold || 30) && !(items[props.showPVItem] && items[props.showPVItem].state === 'OFF')"
                  slots:
                    default:
                      - component: path
                        config:
                          d: "M 270 232 L 410 275"
                          class: luminaFlowBase
                          fill: none
                          stroke: "#80ffff"
                      - component: path
                        config:
                          d: "M 270 232 L 410 275"
                          class: luminaFlowShimmer
                          fill: none
                          stroke: "#80ffff"
                          pathLength: 100
                        slots:
                          default:
                            - component: animate
                              config:
                                attributeName: stroke-dashoffset
                                from: 100
                                to: 0
                                dur: 2.6s
                                repeatCount: indefinite
                      - component: circle
